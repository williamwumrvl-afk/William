<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>羽毛球双打工具 - 最少场次陪打版</title>
  <style>
    :root{
      --bg:#f4f7fb; --card:#fff; --primary:#0ea5e9; --accent:#f97316; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
      --ok:#16a34a; --warn:#d97706; --danger:#dc2626;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"PingFang SC","SF Pro Text","SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:940px;margin:0 auto;padding:16px 14px 28px}
    .hero{background:linear-gradient(135deg,#0ea5e9,#22c55e);color:#fff;border-radius:24px;padding:20px 18px;box-shadow:0 12px 30px rgba(14,165,233,.20)}
    .hero h1{margin:0 0 6px;font-size:28px}
    .hero p{margin:0;opacity:.92;line-height:1.6}
    .grid{display:grid;gap:14px;margin-top:14px}
    .two{grid-template-columns:1.1fr .9fr}
    @media (max-width:780px){.two{grid-template-columns:1fr}}
    .card{background:var(--card);border-radius:22px;padding:16px;box-shadow:0 8px 24px rgba(15,23,42,.06)}
    .title{font-size:18px;font-weight:800;margin:0 0 12px}
    .sub{color:var(--muted);font-size:13px;line-height:1.6}
    textarea,input,button{font:inherit}
    textarea,input{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;outline:none}
    textarea{min-height:180px;resize:vertical}
    .row{display:flex;gap:10px;align-items:center}
    .row>*{flex:1}
    .btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    button{border:0;border-radius:14px;padding:12px 14px;cursor:pointer}
    .primary{background:var(--primary);color:#fff}
    .secondary{background:#eef6ff;color:#0b66a7}
    .pill{display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;font-size:12px;margin:6px 8px 0 0;background:#f8fafc;border:1px solid var(--line)}
    .ok{color:var(--ok)} .warn{color:var(--warn)} .danger{color:var(--danger)}
    .schedule-round{border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:10px}
    .schedule-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed #d9e8f5}
    .match{border-radius:16px;background:linear-gradient(180deg,#f8fbff,#ffffff);padding:9px 10px;margin-top:10px}
    .teamrow{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:8px;align-items:center}
    .team{background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px 10px;box-shadow:0 2px 10px rgba(14,165,233,.06);font-size:15px;line-height:1.26;font-weight:800;letter-spacing:.01em}
    .team div{white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .scorewrap{display:flex;align-items:center;gap:2px;justify-content:center}
    .scorewrap input{width:48px;text-align:center;padding:6px 4px;font-size:15px;font-weight:800}
    .scorewrap span{font-size:12px;font-weight:800}
    .player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
    .player-chip{border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px;cursor:pointer;text-align:center}
    .player-chip:hover{background:#f8fbff}
    dialog{border:0;border-radius:22px;padding:0;max-width:760px;width:calc(100% - 24px)}
    .dialog-card{padding:18px}
    .dialog-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
    .mini{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px}
    .small{font-size:12px;color:var(--muted)}
    .stats-hero{background:linear-gradient(135deg,#0f172a,#1d4ed8 48%,#38bdf8);color:#fff;border-radius:22px;padding:14px 16px;margin-bottom:10px;box-shadow:0 14px 30px rgba(29,78,216,.22)}
    .stats-hero h3{margin:0;font-size:24px;line-height:1.2}
    .stats-hero p{margin:4px 0 0;opacity:.92;font-size:13px}
    .stats-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .stats-card{background:linear-gradient(180deg,#ffffff,#f8fbff);border:1px solid #dbeafe;border-radius:18px;overflow:hidden;box-shadow:0 8px 20px rgba(15,23,42,.05)}
    .stats-headbar,.stats-row{display:grid;grid-template-columns:58px 1.35fr .72fr .72fr .72fr .82fr;gap:6px;align-items:center}
    .stats-headbar{padding:10px 10px;background:linear-gradient(90deg,#0f172a,#1e3a8a 65%,#2563eb);color:#e5f0ff;font-size:12px;text-transform:uppercase;letter-spacing:.08em}
    .stats-row{padding:9px 10px;border-top:1px solid #e5edf7;background:linear-gradient(180deg,#fff,#fbfdff)}
    .stats-row:nth-child(even){background:linear-gradient(180deg,#f8fbff,#ffffff)}
    .medal-wrap{display:flex;align-items:center;justify-content:flex-start}
    .medal-photo,.medal-rank{width:40px;height:40px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center}
    .medal-photo{position:relative;box-shadow: inset 0 2px 3px rgba(255,255,255,.55), 0 6px 14px rgba(15,23,42,.12);border:1px solid rgba(15,23,42,.08);overflow:hidden}
    .medal-photo:before{content:'';position:absolute;inset:4px;border-radius:999px;border:1px solid rgba(255,255,255,.45)}
    .medal-photo svg{width:24px;height:24px;position:relative;z-index:2}
    .medal-gold{background:linear-gradient(145deg,#fff7bf 0%,#facc15 32%,#eab308 65%,#a16207 100%);color:#7c5700}
    .medal-silver{background:linear-gradient(145deg,#ffffff 0%,#e2e8f0 36%,#cbd5e1 68%,#64748b 100%);color:#475569}
    .medal-bronze{background:linear-gradient(145deg,#fed7aa 0%,#ea580c 36%,#c2410c 68%,#7c2d12 100%);color:#fff7ed}
    .medal-rank{font-size:16px;font-weight:800;background:linear-gradient(135deg,#eff6ff,#dbeafe);color:#1e3a8a;border:1px solid #bfdbfe}
    .player-name-elite{font-size:17px !important;font-weight:900 !important}
    .stat-pill{display:inline-flex;min-width:46px;justify-content:center;align-items:center;padding:7px 8px;border-radius:999px;font-weight:800;font-size:17px;background:#f8fafc;border:1px solid #e2e8f0}
    .stat-win{color:#166534;background:#ecfdf5;border-color:#bbf7d0}
    .stat-loss{color:#991b1b;background:#fef2f2;border-color:#fecaca}
    .stat-diff{color:#0f172a;background:#eff6ff;border-color:#bfdbfe}
    .stat-played{color:#1e3a8a;background:#eef6ff;border-color:#bfdbfe}
    @media (max-width:700px){.dialog-grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:600px){
      .app{padding:10px}
      .hero h1{font-size:22px}
      .card{padding:12px;border-radius:18px}
      .title{font-size:16px}
      textarea{min-height:140px}
      .player-grid{grid-template-columns:repeat(3,1fr)}
      .player-chip{padding:10px;font-size:12px}
      .teamrow{grid-template-columns:minmax(0,1fr) auto minmax(0,1fr) !important;gap:6px}
      .team{padding:7px 8px;font-size:14px;font-weight:800}
      .scorewrap input{width:40px;padding:5px 4px;font-size:14px;font-weight:800}
      .scorewrap span{font-size:11px;font-weight:800}
      .stats-headbar,.stats-row{grid-template-columns:50px 1.2fr .66fr .66fr .66fr .74fr;gap:4px;padding:8px}
      .player-name-elite{font-size:15px !important}
      .medal-photo,.medal-rank{width:34px;height:34px}
      .stat-pill{min-width:40px;padding:6px 6px;font-size:15px}
      .stats-actions{display:grid;grid-template-columns:1fr 1fr}
      .stats-actions button{width:100%;font-size:13px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1>羽毛球双打工具</h1>
    <p>目标：保证每个人正式参赛场次完全相同；每个人都与其他人至少搭配一次；最多只允许其中 1 位搭档重复一次；总场次尽量最少；必要时允许 1 场或 2 场陪打局。</p>
  </div>

  <div class="grid two">
    <div class="card">
      <div class="title">创建比赛</div>
      <div class="row">
        <input id="matchTitle" value="周末双打赛" placeholder="比赛名称" />
        <input id="courtText" value="1号场,2号场" placeholder="场地名称" />
      </div>
      <div style="margin-top:10px">
        <textarea id="playerText" placeholder="每行一个姓名，支持 8-12 人">William
Ballack
Jilin
Arix老汤
Micky
David
猫九
胡不归
恩泽
Jenny</textarea>
      </div>
      <div class="btns">
        <button class="primary" id="generateBtn">自动生成最少场次</button>
        <button class="secondary" id="copyShareBtn">复制群文案</button>
      </div>
      <div id="coverageTags"></div>
      <div id="metaText" class="sub" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <div class="title">规则说明</div>
      <div class="sub">
        <div>1. 每个参赛人都至少和其他所有人搭档一次。</div>
        <div>2. 最多只允许其中 1 位搭档重复一次。</div>
        <div>3. 每个人正式参赛场次完全相同。</div>
        <div>4. 总比赛场次按最少原则生成，两个场地优先尽量用满。</div>
        <div>5. 必要时可使用 1 场或 2 场陪打局；陪打人员不计入正式参赛名单、场次和成绩统计。</div>
      </div>
    </div>
  </div>

  <div class="grid two">
    <div class="card">
      <div class="title">对阵表</div>
      <div class="sub">只显示第几轮；比分可直接录入。</div>
      <div id="scheduleWrap"></div>
    </div>
    <div class="card">
      <div class="title">球员</div>
      <div class="player-grid" id="playerGrid"></div>
    </div>
  </div>

  <div class="card">
    <div class="title">个人成绩统计</div>
    <div id="statsWrap"></div>
  </div>
</div>

<dialog id="playerDialog">
  <div class="dialog-card">
    <div class="row" style="align-items:flex-start">
      <div class="title" id="playerDialogTitle" style="margin:0">球员详情</div>
      <div style="flex:0"><button class="secondary" onclick="document.getElementById('playerDialog').close()">关闭</button></div>
    </div>
    <div id="playerDialogBody"></div>
  </div>
</dialog>

<script>
const PLAYER_STORAGE_KEY = 'badminton_players_autosave_v2';
function savePlayers(){
  const el = document.getElementById('playerText');
  if(el) localStorage.setItem(PLAYER_STORAGE_KEY, el.value || '');
}
function loadPlayers(){
  const saved = localStorage.getItem(PLAYER_STORAGE_KEY);
  const el = document.getElementById('playerText');
  if(saved && el) el.value = saved;
}

const state = {
  players: [],
  rounds: [],
  matchCount: 0,
  targetMatches: 0,
  coverage: 0,
  totalPairs: 0,
  usedSparring: false,
  standings: []
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pairKey(a,b){ return a < b ? a + '|' + b : b + '|' + a; }
function uniqNames(text){
  const raw = text.split(/\n+/).map(s=>s.trim()).filter(Boolean).slice(0,12);
  const seen = new Set(), out = [];
  for(const n of raw){ if(!seen.has(n)){ seen.add(n); out.push(n); } }
  return out;
}
function totalPartnerPairs(n){ return n*(n-1)/2; }

const SCHEDULE_TEMPLATES = {"8": [[["reg", [0, 1], [2, 3]]], [["reg", [2, 6], [1, 7]]], [["reg", [3, 4], [1, 5]]], [["reg", [3, 5], [1, 4]]], [["reg", [4, 6], [0, 7]]], [["reg", [5, 6], [0, 3]]], [["reg", [5, 7], [0, 2]]], [["reg", [6, 7], [2, 4]]], [["reg", [2, 7], [1, 3]], ["reg", [4, 5], [0, 6]]], [["reg", [3, 6], [1, 2]], ["reg", [4, 7], [0, 5]]], [["reg", [3, 7], [0, 4]], ["reg", [2, 5], [1, 6]]]], "9": [[["reg", [0, 1], [2, 3]]], [["reg", [0, 3], [2, 4]]], [["reg", [4, 6], [1, 2]]], [["reg", [4, 8], [0, 5]]], [["reg", [5, 6], [0, 7]]], [["reg", [5, 7], [2, 8]]], [["reg", [3, 4], [1, 8]], ["reg", [0, 6], [2, 7]]], [["reg", [3, 5], [1, 6]], ["reg", [4, 7], [0, 8]]], [["reg", [3, 7], [1, 5]], ["reg", [6, 8], [0, 2]]], [["reg", [3, 8], [1, 4]], ["reg", [6, 7], [2, 5]]], [["reg", [5, 8], [0, 4]], ["reg", [3, 6], [1, 7]]], [["reg", [7, 8], [2, 6]], ["reg", [4, 5], [1, 3]]]], "10": [[["reg", [3, 6], [2, 5]]], [["reg", [3, 8], [1, 9]]], [["reg", [4, 5], [1, 8]]], [["reg", [5, 6], [1, 2]]], [["reg", [5, 7], [0, 9]]], [["reg", [6, 9], [0, 4]]], [["reg", [7, 8], [2, 9]]], [["reg", [3, 4], [2, 7]], ["reg", [6, 8], [0, 5]]], [["reg", [3, 5], [2, 6]], ["reg", [8, 9], [0, 1]]], [["reg", [3, 9], [1, 4]], ["reg", [5, 8], [0, 7]]], [["reg", [4, 7], [1, 6]], ["reg", [0, 3], [2, 8]]], [["reg", [4, 8], [1, 5]], ["reg", [7, 9], [0, 2]]], [["reg", [5, 9], [0, 6]], ["reg", [3, 7], [2, 4]]], [["reg", [6, 7], [0, 8]], ["reg", [4, 9], [1, 3]]], [["spar", [2, 3], null], ["reg", [4, 6], [1, 7]]]], "11": [[["reg", [3, 10], [2, 4]], ["reg", [5, 7], [1, 6]]], [["reg", [3, 5], [2, 10]], ["reg", [4, 8], [1, 9]]], [["reg", [3, 9], [2, 5]], ["reg", [4, 7], [1, 10]]], [["reg", [4, 10], [1, 5]], ["reg", [3, 8], [2, 7]]], [["reg", [5, 6], [1, 7]], ["reg", [8, 10], [0, 2]]], [["reg", [5, 8], [1, 4]], ["reg", [6, 7], [0, 10]]], [["reg", [6, 10], [0, 7]], ["reg", [4, 9], [1, 8]]], [["reg", [6, 8], [0, 9]], ["reg", [5, 10], [1, 2]]], [["reg", [7, 10], [0, 4]], ["reg", [3, 6], [2, 9]]], [["reg", [7, 8], [0, 6]], ["reg", [5, 9], [1, 3]]], [["reg", [7, 9], [0, 5]], ["reg", [4, 6], [2, 3]]], [["reg", [8, 9], [0, 3]], ["reg", [4, 5], [2, 6]]], [["reg", [9, 10], [0, 1]], ["reg", [3, 7], [2, 8]]], [["spar", [3, 4], null], ["reg", [6, 9], [0, 8]]]], "12": [[["reg", [0, 1], [3, 4]]], [["reg", [3, 10], [2, 11]], ["reg", [5, 9], [1, 8]]], [["reg", [3, 11], [2, 4]], ["reg", [5, 8], [1, 9]]], [["reg", [4, 11], [2, 3]], ["reg", [7, 10], [0, 9]]], [["reg", [4, 8], [2, 7]], ["reg", [5, 11], [1, 6]]], [["reg", [4, 9], [2, 6]], ["reg", [5, 7], [1, 10]]], [["reg", [5, 10], [1, 7]], ["reg", [0, 8], [3, 6]]], [["reg", [6, 10], [1, 2]], ["reg", [0, 4], [3, 5]]], [["reg", [6, 11], [0, 7]], ["reg", [4, 5], [2, 10]]], [["reg", [6, 7], [1, 5]], ["reg", [8, 11], [3, 9]]], [["reg", [6, 8], [1, 4]], ["reg", [9, 11], [0, 2]]], [["reg", [7, 11], [3, 8]], ["reg", [4, 6], [2, 9]]], [["reg", [7, 8], [0, 11]], ["reg", [4, 10], [2, 5]]], [["reg", [7, 9], [0, 10]], ["reg", [5, 6], [1, 11]]], [["reg", [8, 10], [0, 5]], ["reg", [6, 9], [1, 3]]], [["reg", [8, 9], [0, 6]], ["reg", [10, 11], [3, 7]]], [["reg", [9, 10], [0, 3]], ["reg", [4, 7], [2, 8]]]]};

function buildRoundsFromTemplate(names){
  const tpl = SCHEDULE_TEMPLATES[String(names.length)];
  if(!tpl) throw new Error('当前版本只支持 8-12 人');
  return tpl.map((roundDef, idx) => {
    const matches = roundDef.map((m, mIdx) => {
      const kind = m[0];
      const teamA = m[1].map(i => names[i]);
      const teamB = kind === 'reg' ? m[2].map(i => names[i]) : ['陪打A','陪打B'];
      return {
        teamA,
        teamB,
        sparring: kind === 'spar',
        scoreA: '',
        scoreB: ''
      };
    });
    const active = new Set();
    matches.forEach(mt => {
      mt.teamA.concat(mt.teamB).forEach(p => { if(names.includes(p)) active.add(p); });
    });
    return {
      round: idx + 1,
      bye: names.filter(n => !active.has(n)),
      matches
    };
  });
}

function calcTargetMatches(n){
  // In the precomputed templates below, every formal player partners every other player exactly once.
  // So the formal match count per player is n-1, which is also the minimum possible.
  return n - 1;
}

function countPairCoverage(rounds){
  const set = new Set();
  rounds.forEach(rd => rd.matches.forEach(m => {
    if(m.teamA.every(x => !x.startsWith('陪打'))) set.add(pairKey(m.teamA[0], m.teamA[1]));
    if(m.teamB.every(x => !x.startsWith('陪打'))) set.add(pairKey(m.teamB[0], m.teamB[1]));
  }));
  return set.size;
}

function generateEqualSchedule(names){
  const rounds = buildRoundsFromTemplate(names);
  const targetMatches = calcTargetMatches(names.length);
  const coverage = countPairCoverage(rounds);
  const sparCount = rounds.reduce((acc, rd) => acc + rd.matches.filter(m => m.sparring).length, 0);
  return {
    rounds,
    matchCount: rounds.reduce((s,rd)=>s+rd.matches.length,0),
    targetMatches,
    coverage,
    totalPairs: totalPartnerPairs(names.length),
    usedSparring: sparCount > 0,
    sparCount
  };
}

function getStandings(){
  const map = {};
  for(const name of state.players){
    map[name] = {
      name, played: 0, win: 0, loss: 0, diff: 0,
      partners: new Set(), opponents: new Set(),
    };
  }

  state.rounds.forEach(rd => {
    rd.matches.forEach(m => {
      const all = m.teamA.concat(m.teamB).filter(p => map[p]);
      all.forEach(p => { map[p].played++; });
      if(map[m.teamA[0]] && map[m.teamA[1]]){ map[m.teamA[0]].partners.add(m.teamA[1]); map[m.teamA[1]].partners.add(m.teamA[0]); }
      if(map[m.teamB[0]] && map[m.teamB[1]]){ map[m.teamB[0]].partners.add(m.teamB[1]); map[m.teamB[1]].partners.add(m.teamB[0]); }
      m.teamA.forEach(a => m.teamB.forEach(b => { if(map[a] && map[b]){ map[a].opponents.add(b); map[b].opponents.add(a); } }));

      const a = Number(m.scoreA), b = Number(m.scoreB);
      const scored = m.scoreA !== '' && m.scoreB !== '' && !Number.isNaN(a) && !Number.isNaN(b);
      if(!scored) return;

      m.teamA.forEach(p => {
        if(!map[p]) return;
        map[p].diff += a - b;
        if(a > b) map[p].win++; else if(a < b) map[p].loss++;
      });
      m.teamB.forEach(p => {
        if(!map[p]) return;
        map[p].diff += b - a;
        if(b > a) map[p].win++; else if(b < a) map[p].loss++;
      });
    });
  });

  return Object.values(map).map(x => ({
    ...x,
    partnerCount: x.partners.size,
    opponentCount: x.opponents.size
  })).sort((a,b) => b.win - a.win || b.diff - a.diff || b.partnerCount - a.partnerCount || a.name.localeCompare(b.name, 'zh-CN'));
}
function allPlayedEqual(){
  return state.standings.length ? state.standings.every(x => x.played === state.standings[0].played) : true;
}
function renderTags(){
  const allPartnered = state.standings.length ? state.standings.every(x => x.partnerCount === state.players.length - 1) : false;
  document.getElementById('coverageTags').innerHTML = `
    <span class="pill">搭档覆盖 ${state.coverage}/${state.totalPairs}</span>
    <span class="pill ${allPartnered ? 'ok' : 'danger'}">${allPartnered ? '每个人都已和其他所有人搭档' : '搭档覆盖未完成'}</span>
    <span class="pill ${allPlayedEqual() ? 'ok' : 'danger'}">${allPlayedEqual() ? '所有人场次完全相同' : '场次不相同'}</span>
    <span class="pill">每人 ${state.targetMatches} 场</span>
    <span class="pill">总场次 ${state.matchCount}</span>
    <span class="pill">总轮次 ${state.rounds.length}</span>
    <span class="pill ${state.usedSparring ? 'warn' : 'ok'}">${state.usedSparring ? `已启用 ${state.rounds.reduce((a,r)=>a+r.matches.filter(m=>m.sparring).length,0)} 场陪打` : '未启用陪打'}</span>
  `;
  document.getElementById('metaText').innerHTML = `当前 ${state.players.length} 人参赛。正式参赛成员每人 <strong>${state.targetMatches}</strong> 场，且场次完全相同；系统共排出 <strong>${state.matchCount}</strong> 场、<strong>${state.rounds.length}</strong> 轮。${state.usedSparring ? ` 其中含 ${state.rounds.reduce((a,r)=>a+r.matches.filter(m=>m.sparring).length,0)} 场陪打局，不计入正式球员场次。` : ''}`;
}
function renderSchedule(){
  const wrap = document.getElementById('scheduleWrap');
  wrap.innerHTML = '';
  state.rounds.forEach((rd, rIndex) => {
    const box = document.createElement('div');
    box.className = 'schedule-round';
    box.innerHTML = `<div class="schedule-head"><strong>第 ${rd.round} 轮</strong><span class="small">${rd.bye.length ? '轮空：' + rd.bye.join('、') : '无人轮空'}</span></div>`;

    rd.matches.forEach((m, mIndex) => {
      const match = document.createElement('div');
      match.className = 'match';
      match.innerHTML = `
        <div class="teamrow">
          <div class="team"><div>${m.teamA[0]}</div><div>${m.teamA[1]}</div></div>
          <div class="scorewrap">
            <input data-r="${rIndex}" data-m="${mIndex}" data-f="scoreA" value="${m.scoreA}" />
            <span>-</span>
            <input data-r="${rIndex}" data-m="${mIndex}" data-f="scoreB" value="${m.scoreB}" />
          </div>
          <div class="team"><div>${m.teamB[0]}</div><div>${m.teamB[1]}</div></div>
        </div>
        ${m.sparring ? '<div class="small" style="margin-top:6px">本场为陪打补位局</div>' : ''}
      `;
      box.appendChild(match);
    });
    wrap.appendChild(box);
  });

  wrap.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const r = Number(e.target.dataset.r), m = Number(e.target.dataset.m), f = e.target.dataset.f;
      state.rounds[r].matches[m][f] = e.target.value;
      state.standings = getStandings();
      renderStats();
      renderPlayers();
      renderTags();
    });
  });
}
function renderPlayers(){
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = '';
  state.standings.forEach(p => {
    const el = document.createElement('button');
    el.className = 'player-chip';
    el.innerHTML = `<div><strong>${p.name}</strong></div><div class="small">${p.played} 场 · ${p.win} 胜 · 搭档 ${p.partnerCount}/${Math.max(0, state.players.length - 1)}</div>`;
    el.onclick = () => openPlayerModal(p.name);
    grid.appendChild(el);
  });
}
function medalSVG(idx){
  if(idx === 0){
    return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.35 4.76 5.25.76-3.8 3.7.9 5.23L12 14l-4.7 2.47.9-5.23-3.8-3.7 5.25-.76L12 2z"/></svg>`;
  }
  if(idx === 1){
    return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l6 3v5c0 4.1-2.55 7.78-6 9-3.45-1.22-6-4.9-6-9V6l6-3zm0 4.2l-2.05 4.15L5.4 12l3.28 3.2-.78 4.52L12 17.54l4.1 2.18-.78-4.52L18.6 12l-4.55-.65L12 7.2z"/></svg>`;
  }
  return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2h10v3h2a1 1 0 0 1 1 1c0 3.2-1.9 5.74-4.72 6.57A5.98 5.98 0 0 1 13 15.92V18h3v2H8v-2h3v-2.08a5.98 5.98 0 0 1-2.28-3.35C5.9 11.74 4 9.2 4 6a1 1 0 0 1 1-1h2V2zm10 5V5h-1v4.54A4.98 4.98 0 0 0 17 7zM7 9.54V5H6v2c0 2.01.84 3.6 1 2.54z"/></svg>`;
}
function renderStats(){
  const wrap = document.getElementById('statsWrap');
  const medalClass = idx => idx === 0 ? 'medal-gold' : idx === 1 ? 'medal-silver' : idx === 2 ? 'medal-bronze' : 'rank-plain';
  const rows = state.standings.map((p, idx) => `
    <div class="stats-row">
      <div class="medal-wrap">${idx < 3 ? `<span class="medal-photo ${medalClass(idx)}">${medalSVG(idx)}</span>` : `<span class="medal-rank">${idx + 1}</span>`}</div>
      <div><button class="secondary player-name-elite" style="padding:8px 12px;border-radius:12px" onclick="openPlayerModal('${p.name.replace(/'/g,"\\'")}')">${p.name}</button></div>
      <div><span class="stat-pill stat-played">${p.played}</span></div>
      <div><span class="stat-pill stat-win">${p.win}</span></div>
      <div><span class="stat-pill stat-loss">${p.loss}</span></div>
      <div><span class="stat-pill stat-diff">${p.diff > 0 ? '+' + p.diff : p.diff}</span></div>
    </div>`).join('');
  wrap.innerHTML = `
    <div class="stats-hero">
      <h3>个人成绩统计</h3>
      <p>陪打人员不计入这里的统计。</p>
    </div>
    <div class="stats-card">
      <div class="stats-headbar">
        <div>名次</div><div>参赛人员</div><div>本场</div><div>胜</div><div>负</div><div>净胜分</div>
      </div>
      ${rows}
    </div>
  `;
}
function openPlayerModal(name){
  const p = state.standings.find(x => x.name === name);
  if(!p) return;
  const items = [];
  state.rounds.forEach(rd => {
    rd.matches.forEach(m => {
      const inA = m.teamA.includes(name), inB = m.teamB.includes(name);
      if(!inA && !inB) return;
      const myTeam = inA ? m.teamA : m.teamB;
      const partner = inA ? m.teamA.find(x => x !== name) : m.teamB.find(x => x !== name);
      const opponents = inA ? m.teamB : m.teamA;
      items.push(`
        <div class="match">
          <div><strong>第 ${rd.round} 轮</strong>${m.sparring ? ' · 陪打局' : ''}</div>
          <div class="small" style="margin-top:6px">本方组合：${myTeam.join(' / ')}</div>
          <div class="small">对手：${opponents.join(' / ')}</div>
          <div class="small">比分：${m.scoreA !== '' && m.scoreB !== '' ? `${m.scoreA}:${m.scoreB}` : '未录入'}</div>
        </div>`);
    });
  });
  document.getElementById('playerDialogTitle').textContent = name + ' 的对阵情况';
  document.getElementById('playerDialogBody').innerHTML = `
    <div class="dialog-grid">
      <div class="mini"><div class="small">本场场次</div><div><strong>${p.played}</strong></div></div>
      <div class="mini"><div class="small">已搭档人数</div><div><strong>${p.partnerCount}/${Math.max(0, state.players.length - 1)}</strong></div></div>
      <div class="mini"><div class="small">胜 / 负</div><div><strong>${p.win} / ${p.loss}</strong></div></div>
      <div class="mini"><div class="small">净胜分</div><div><strong>${p.diff}</strong></div></div>
    </div>
    ${items.join('') || '<div class="sub">暂无数据</div>'}
  `;
  document.getElementById('playerDialog').showModal();
}
function copyShare(){
  if(!state.rounds.length){ alert('请先生成比赛'); return; }
  const lines = [`【${document.getElementById('matchTitle').value || '羽毛球双打赛'}】`];
  lines.push(`人数：${state.players.length}人`);
  lines.push(`每人场次：${state.targetMatches}`);
  lines.push(`总场次：${state.matchCount}`);
  lines.push(`总轮次：${state.rounds.length}`);
  lines.push(`搭档覆盖：${state.coverage}/${state.totalPairs}`);
  if(state.usedSparring) lines.push(`含 ${state.rounds.reduce((a,r)=>a+r.matches.filter(m=>m.sparring).length,0)} 场陪打局`);
  lines.push('');
  state.rounds.forEach(rd => {
    lines.push(`第${rd.round}轮`);
    rd.matches.forEach(m => lines.push(`${m.teamA[0]}/${m.teamA[1]} VS ${m.teamB[0]}/${m.teamB[1]}${m.scoreA !== '' && m.scoreB !== '' ? `（${m.scoreA}:${m.scoreB}）` : ''}`));
    if(rd.bye.length) lines.push(`轮空：${rd.bye.join('、')}`);
    lines.push('');
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => alert('已复制群文案')).catch(() => alert('复制失败'));
}
function generate(){
  savePlayers();
  const names = uniqNames(document.getElementById('playerText').value);
  if(names.length < 8 || names.length > 12){
    alert('请输入 8-12 位不重复的参赛人员');
    return;
  }
  try{
    const result = generateEqualSchedule(names);
    state.players = names.slice();
    state.rounds = result.rounds;
    state.coverage = result.coverage;
    state.totalPairs = result.totalPairs;
    state.matchCount = result.matchCount;
    state.usedSparring = result.usedSparring;
    state.targetMatches = result.targetMatches;
    state.standings = getStandings();
    renderTags();
    renderSchedule();
    renderPlayers();
    renderStats();
  }catch(err){
    alert(err.message || '生成失败，请再试一次');
  }
}
document.getElementById('generateBtn').addEventListener('click', generate);
document.getElementById('copyShareBtn').addEventListener('click', copyShare);
document.getElementById('playerText').addEventListener('input', savePlayers);
loadPlayers();
generate();
</script>
</body>
</html>
